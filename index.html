<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>FinFlow · Premium Budget & Notes</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f0f2f7;
      --surface: rgba(255,255,255,0.75);
      --surface-solid: #ffffff;
      --border: rgba(0,0,0,0.06);
      --text: #0b1424;
      --text-secondary: #475569;
      --text-muted: #94a3b8;
      --blue: #3b6cf4;
      --blue-light: #eef3ff;
      --green: #0dca7a;
      --green-light: #eafcf4;
      --red: #f43e5f;
      --red-light: #fff0f3;
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 8px 24px rgba(0,0,0,0.06), 0 2px 6px rgba(0,0,0,0.02);
      --shadow-lg: 0 16px 40px rgba(0,0,0,0.08);
      --radius-xs: 12px;
      --radius-sm: 16px;
      --radius: 20px;
      --radius-lg: 28px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      background-image: radial-gradient(circle at 20% 10%, rgba(59,108,244,0.04) 0%, transparent 45%),
                        radial-gradient(circle at 80% 70%, rgba(13,202,122,0.03) 0%, transparent 45%);
    }

    .app {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      background: transparent;
      backdrop-filter: blur(10px);
      padding-bottom: 90px;
    }

    /* Header */
    .header {
      padding: 20px 20px 12px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 16px rgba(0,0,0,0.02);
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, #3b6cf4, #60a5fa);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(59,108,244,0.3);
    }
    .logo-text {
      font-weight: 700;
      font-size: 1.5rem;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .balance-pill {
      background: rgba(255,255,255,0.6);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius: 30px;
      padding: 8px 18px;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text);
      box-shadow: var(--shadow-sm);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .balance-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 3px rgba(13,202,122,0.2);
    }

    /* Main content */
    .main-content {
      flex: 1;
      padding: 12px 16px;
      overflow-y: auto;
    }

    .section {
      display: none;
      animation: fadeSlide 0.3s ease;
    }
    .section.active {
      display: block;
    }
    @keyframes fadeSlide {
      from { opacity: 0.5; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Bottom Navigation */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 12px 20px 22px;
      z-index: 60;
      box-shadow: 0 -8px 30px rgba(0,0,0,0.04);
    }
    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 3px;
      background: none;
      border: none;
      font-family: var(--font);
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--transition);
      padding: 6px 16px;
      border-radius: 24px;
      position: relative;
    }
    .nav-item.active {
      color: var(--blue);
      background: rgba(59,108,244,0.06);
    }
    .nav-icon {
      font-size: 1.3rem;
      line-height: 1;
    }
    .nav-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: transparent;
      transition: background var(--transition);
    }
    .nav-item.active .nav-dot {
      background: var(--blue);
    }

    /* Buttons */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 30px;
      padding: 14px 20px;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: -0.3px;
      box-shadow: 0 6px 20px rgba(59,108,244,0.3);
      width: 100%;
    }
    .btn:active { transform: scale(0.97); box-shadow: 0 4px 12px rgba(59,108,244,0.2); }
    .btn-outline {
      background: transparent;
      color: var(--blue);
      border: 1.5px solid var(--blue);
      box-shadow: none;
    }
    .btn-small {
      padding: 8px 14px;
      font-size: 0.75rem;
      width: auto;
    }
    .icon-btn {
      background: none;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      color: var(--text-muted);
      padding: 8px;
      border-radius: 12px;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:active { background: rgba(0,0,0,0.05); color: var(--text); }

    /* Money Box Card */
    .box-card {
      background: var(--surface-solid);
      border-radius: var(--radius-lg);
      margin-bottom: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-md);
      backdrop-filter: blur(10px);
      transition: transform var(--transition), box-shadow var(--transition);
    }
    .box-card:active { transform: scale(0.99); box-shadow: var(--shadow-lg); }
    .box-header {
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.6);
    }
    .box-title-row {
      display: flex;
      flex-direction: column;
    }
    .box-title {
      font-weight: 700;
      font-size: 1.05rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .box-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 0 4px rgba(59,108,244,0.2);
    }
    .box-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .box-amount-row {
      padding: 18px 18px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      border-bottom: 1px solid var(--border);
    }
    .box-initial {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }
    .box-balance {
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -0.5px;
    }
    .box-balance.positive { color: var(--green); }
    .box-balance.negative { color: var(--red); }
    .box-actions {
      display: flex;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .btn-add, .btn-deduct {
      flex: 1;
      padding: 12px;
      border-radius: 30px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all var(--transition);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-add { background: var(--green-light); color: var(--green); }
    .btn-deduct { background: var(--red-light); color: var(--red); }
    .btn-add:active { background: #c6f0d6; }
    .btn-deduct:active { background: #fcd4d4; }

    .transaction-list {
      max-height: 240px;
      overflow-y: auto;
      padding: 8px 12px;
      scrollbar-width: thin;
      scrollbar-color: rgba(0,0,0,0.1) transparent;
    }
    .transaction-list::-webkit-scrollbar { width: 4px; }
    .transaction-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 10px; }

    .trans-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 10px;
      border-radius: 14px;
      margin: 3px 0;
      font-size: 0.82rem;
      transition: background var(--transition);
      background: transparent;
    }
    .trans-item.add { background: #f8fdf9; }
    .trans-item.deduct { background: #fef8f8; }
    .trans-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.9rem;
      flex-shrink: 0;
    }
    .add .trans-icon { background: #d4f3e0; color: var(--green); }
    .deduct .trans-icon { background: #fde0e0; color: var(--red); }
    .trans-info { flex:1; min-width:0; }
    .trans-cat { font-weight: 600; color: var(--text); }
    .trans-desc { font-size: 0.7rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trans-amount { font-weight: 700; flex-shrink: 0; font-size: 0.9rem; }
    .add .trans-amount { color: var(--green); }
    .deduct .trans-amount { color: var(--red); }
    .trans-date { font-size: 0.65rem; color: var(--text-muted); }

    /* Notes */
    .note-card {
      background: var(--surface-solid);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: box-shadow var(--transition);
    }
    .note-card:active { box-shadow: var(--shadow-md); }
    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .note-title-input {
      font-weight: 700;
      border: none;
      background: transparent;
      font-size: 1.05rem;
      width: 65%;
      outline: none;
      border-bottom: 2px solid transparent;
      padding: 4px 0;
      transition: border-color var(--transition);
    }
    .note-title-input:focus { border-bottom-color: var(--blue); }
    .note-body {
      width: 100%;
      min-height: 90px;
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 14px;
      font-family: var(--font);
      font-size: 0.85rem;
      resize: vertical;
      background: #fafbfc;
      outline: none;
      transition: border-color var(--transition);
    }
    .note-body:focus { border-color: var(--blue); }
    .copy-btn {
      background: var(--blue-light);
      color: var(--blue);
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
    }
    .copy-btn:active { background: #dce4ff; }

    /* Analytics */
    .chart-box {
      background: var(--surface-solid);
      border-radius: var(--radius);
      padding: 18px 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .chart-box h3 {
      font-size: 0.95rem;
      font-weight: 700;
      margin-bottom: 12px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 6px;
      letter-spacing: -0.2px;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: var(--surface-solid);
      border-radius: var(--radius);
      padding: 16px 6px;
      text-align: center;
      border: 1px solid var(--border);
      box-shadow: var(--shadow-sm);
      transition: transform var(--transition);
    }
    .stat-card:active { transform: translateY(-2px); }
    .stat-value {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.3px;
    }
    .stat-label {
      font-size: 0.6rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-top: 4px;
    }
    .period-selector {
      display: flex;
      gap: 8px;
      margin-bottom: 18px;
    }
    .period-btn {
      flex: 1;
      padding: 12px;
      border-radius: 30px;
      border: 1.5px solid var(--border);
      background: rgba(255,255,255,0.6);
      font-weight: 600;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text-secondary);
      backdrop-filter: blur(4px);
    }
    .period-btn.active {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
      box-shadow: 0 6px 14px rgba(59,108,244,0.25);
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(10,15,25,0.5);
      backdrop-filter: blur(6px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-sheet {
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(20px);
      width: 100%;
      max-width: 440px;
      border-radius: 32px 32px 0 0;
      padding: 22px 22px 34px;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 85vh;
      overflow-y: auto;
      box-shadow: 0 -12px 40px rgba(0,0,0,0.12);
    }
    .modal-overlay.active .modal-sheet {
      transform: translateY(0);
    }
    .modal-handle {
      width: 44px;
      height: 5px;
      background: #d1d5db;
      border-radius: 10px;
      margin: 0 auto 18px;
    }
    .modal-title {
      font-weight: 700;
      font-size: 1.3rem;
      text-align: center;
      margin-bottom: 18px;
      letter-spacing: -0.3px;
    }
    input, select, textarea {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 16px;
      font-family: var(--font);
      font-size: 0.9rem;
      background: #f9fafb;
      margin: 6px 0 14px;
      color: var(--text);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(59,108,244,0.08);
      background: white;
    }
    label {
      font-weight: 600;
      font-size: 0.68rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      display: block;
      margin-top: 2px;
    }
  </style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="logo">
      <div class="logo-icon">F</div>
      <span class="logo-text">FinFlow</span>
    </div>
    <div class="balance-pill" id="globalBalance">
      <span class="balance-dot"></span> ₹0
    </div>
  </header>

  <div class="main-content">
    <section id="budgetSection" class="section active">
      <div style="margin: 8px 0 16px;">
        <button class="btn" id="createBoxBtn">+ New Money Box</button>
      </div>
      <div id="boxesContainer"></div>
    </section>

    <section id="notesSection" class="section">
      <div style="margin:8px 0 16px;">
        <button class="btn btn-outline" id="addNoteBtn">+ New Note</button>
      </div>
      <div id="notesContainer"></div>
    </section>

    <section id="analyticsSection" class="section">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="period-selector" id="periodSelector">
        <button class="period-btn active" data-period="week">This Week</button>
        <button class="period-btn" data-period="month">This Month</button>
        <button class="period-btn" data-period="all">All Time</button>
      </div>
      <div class="chart-box">
        <h3>📈 Cumulative Balance Trend</h3>
        <canvas id="trendChart" height="190"></canvas>
      </div>
      <div class="chart-box">
        <h3>💰 Income vs Expenses (Period)</h3>
        <canvas id="barChart" height="210"></canvas>
      </div>
      <div class="chart-box">
        <h3>🍩 Expenses by Category</h3>
        <canvas id="categoryChart" height="210"></canvas>
      </div>
    </section>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="budget"><span class="nav-icon">◻</span>Budget<span class="nav-dot"></span></button>
    <button class="nav-item" data-tab="notes"><span class="nav-icon">📝</span>Notes<span class="nav-dot"></span></button>
    <button class="nav-item" data-tab="analytics"><span class="nav-icon">📊</span>Stats<span class="nav-dot"></span></button>
  </nav>
</div>

<!-- Modals -->
<div class="modal-overlay" id="createBoxModal">
  <div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">New Money Box</div>
    <label>Box Name</label><input type="text" id="boxName" placeholder="e.g. Salary">
    <label>Initial Amount (₹)</label><input type="number" id="boxAmount" placeholder="0" step="0.01">
    <label>Category</label><select id="boxCategory"><option>Salary</option><option>Friend</option><option>Family</option><option>Business</option><option>Custom</option></select>
    <input type="text" id="boxCustomCat" placeholder="Custom category" style="display:none;">
    <label>Description (optional)</label><input type="text" id="boxDesc" placeholder="Note...">
    <label>Date & Time</label><input type="datetime-local" id="boxDateTime">
    <button class="btn" id="createBoxSubmit" style="margin-top:8px;">Create Box</button>
    <button class="btn btn-outline" id="cancelCreateBox" style="margin-top:6px;">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="addMoneyModal">
  <div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Add Money</div>
    <input type="hidden" id="addBoxId">
    <label>Amount (₹)</label><input type="number" id="addAmount" placeholder="0" step="0.01">
    <label>Category</label><select id="addCategory"><option>Salary</option><option>Friend</option><option>Family</option><option>Custom</option></select>
    <input type="text" id="addCustomCat" placeholder="Custom category" style="display:none;">
    <label>Description</label><input type="text" id="addDesc" placeholder="Optional note">
    <label>Date & Time</label><input type="datetime-local" id="addDateTime">
    <button class="btn" id="addMoneySubmit" style="background:var(--green);">Add Money</button>
    <button class="btn btn-outline" id="cancelAddMoney" style="margin-top:6px;">Cancel</button>
  </div>
</div>

<div class="modal-overlay" id="deductMoneyModal">
  <div class="modal-sheet"><div class="modal-handle"></div><div class="modal-title">Deduct Money</div>
    <input type="hidden" id="deductBoxId">
    <label>Amount (₹)</label><input type="number" id="deductAmount" placeholder="0" step="0.01">
    <label>Category</label><select id="deductCategory"><option>Food</option><option>Transport</option><option>Shopping</option><option>Bills</option><option>Custom</option></select>
    <input type="text" id="deductCustomCat" placeholder="Custom category" style="display:none;">
    <label>Description</label><input type="text" id="deductDesc" placeholder="Optional note">
    <label>Date & Time</label><input type="datetime-local" id="deductDateTime">
    <button class="btn" id="deductMoneySubmit" style="background:var(--red);">Deduct Money</button>
    <button class="btn btn-outline" id="cancelDeductMoney" style="margin-top:6px;">Cancel</button>
  </div>
</div>

<script>
  (() => {
    const STORAGE_KEY = 'finflow_ultra_v5';

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : { boxes: [], notes: [] };
    }
    function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2,6); }
    function getNow() { return new Date().toISOString().slice(0,16); }
    function fmtCurrency(amt) { return '₹' + Math.abs(amt).toLocaleString('en-IN',{minimumFractionDigits:0,maximumFractionDigits:2}); }
    function fmtDate(iso) { if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})+' · '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}); }

    function getBoxBalance(box) {
      const adds = box.transactions.filter(t=>t.type==='add').reduce((s,t)=>s+parseFloat(t.amount||0),0);
      const deds = box.transactions.filter(t=>t.type==='deduct').reduce((s,t)=>s+parseFloat(t.amount||0),0);
      return parseFloat(box.initialAmount||0) + adds - deds;
    }

    // Tabs
    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', function(){
        document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
        this.classList.add('active');
        const tab = this.dataset.tab;
        document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
        document.getElementById(tab+'Section').classList.add('active');
        if(tab==='analytics') renderAnalytics();
      });
    });

    function renderBudget() {
      const data = loadData();
      const container = document.getElementById('boxesContainer');
      if(!data.boxes.length) {
        container.innerHTML = '<div style="text-align:center;padding:45px 20px;color:var(--text-muted);">✨ No money boxes yet.<br>Tap "+ New Money Box" to start</div>';
        updateGlobalBalance(0);
        return;
      }
      let total = 0;
      let html = '';
      data.boxes.forEach(box => {
        const bal = getBoxBalance(box);
        total += bal;
        const balClass = bal>=0 ? 'positive' : 'negative';
        html += `<div class="box-card">
          <div class="box-header">
            <div class="box-title-row">
              <div class="box-title"><span class="box-dot"></span>${esc(box.name)}</div>
              <div class="box-meta">${esc(box.initialCategory)} · Created ${fmtDate(box.initialDateTime)}</div>
            </div>
            <button class="icon-btn" data-deletebox="${box.id}">🗑️</button>
          </div>
          <div class="box-amount-row">
            <span class="box-initial">Initial ${fmtCurrency(parseFloat(box.initialAmount||0))}</span>
            <span class="box-balance ${balClass}">${fmtCurrency(bal)}</span>
          </div>
          <div class="box-actions">
            <button class="btn-add" data-add="${box.id}">+ Add</button>
            <button class="btn-deduct" data-deduct="${box.id}">− Deduct</button>
          </div>
          <div class="transaction-list">${renderTransactions(box)}</div>
        </div>`;
      });
      container.innerHTML = html;
      updateGlobalBalance(total);
      attachBudgetEvents();
    }

    function renderTransactions(box) {
      if(!box.transactions.length) return '<div style="text-align:center;padding:18px;color:var(--text-muted);font-size:0.8rem;">No transactions yet</div>';
      // Sort latest first (newest at top)
      const sorted = [...box.transactions].sort((a,b)=> new Date(b.dateTime||0) - new Date(a.dateTime||0));
      return sorted.map(t=>{
        const cls = t.type==='add'?'add':'deduct';
        const sign = t.type==='add'?'+':'−';
        return `<div class="trans-item ${cls}">
          <div class="trans-icon">${sign}</div>
          <div class="trans-info">
            <div class="trans-cat">${esc(t.category||'')}</div>
            ${t.description?`<div class="trans-desc">${esc(t.description)}</div>`:''}
            <div class="trans-date">${fmtDate(t.dateTime)}</div>
          </div>
          <div class="trans-amount">${sign} ${fmtCurrency(parseFloat(t.amount||0))}</div>
          <button class="icon-btn" data-deletetrans="${box.id}|${t.id}">✕</button>
        </div>`;
      }).join('');
    }

    function attachBudgetEvents() {
      document.querySelectorAll('[data-deletebox]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          if(confirm('Delete this money box?')) {
            const data = loadData();
            data.boxes = data.boxes.filter(b=>b.id!==btn.dataset.deletebox);
            saveData(data);
            renderBudget();
          }
        });
      });
      document.querySelectorAll('[data-add]').forEach(btn => {
        btn.addEventListener('click', () => openAddModal(btn.dataset.add));
      });
      document.querySelectorAll('[data-deduct]').forEach(btn => {
        btn.addEventListener('click', () => openDeductModal(btn.dataset.deduct));
      });
      document.querySelectorAll('[data-deletetrans]').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const [boxId, transId] = btn.dataset.deletetrans.split('|');
          const data = loadData();
          const box = data.boxes.find(b=>b.id===boxId);
          if(box) box.transactions = box.transactions.filter(t=>t.id!==transId);
          saveData(data);
          renderBudget();
        });
      });
    }

    function updateGlobalBalance(total) {
      document.getElementById('globalBalance').innerHTML = `<span class="balance-dot"></span> ${fmtCurrency(total)}`;
    }

    // Notes
    function renderNotes() {
      const data = loadData();
      const container = document.getElementById('notesContainer');
      if(!data.notes.length) {
        container.innerHTML = '<div style="text-align:center;padding:45px;color:var(--text-muted);">📋 No notes yet.<br>Create one to store text</div>';
        return;
      }
      container.innerHTML = data.notes.map(note=>`
        <div class="note-card">
          <div class="note-header">
            <input class="note-title-input" value="${esc(note.title)}" data-noteid="${note.id}" placeholder="Title">
            <div style="display:flex;gap:8px;">
              <button class="copy-btn" data-copynote="${note.id}">Copy</button>
              <button class="icon-btn" data-deletenote="${note.id}">🗑️</button>
            </div>
          </div>
          <textarea class="note-body" data-noteid="${note.id}" placeholder="Write something...">${esc(note.content)}</textarea>
        </div>
      `).join('');
      attachNotesEvents();
    }

    function attachNotesEvents() {
      document.querySelectorAll('.note-title-input').forEach(inp => {
        inp.addEventListener('change', function() { updateNoteTitle(this.dataset.noteid, this.value); });
      });
      document.querySelectorAll('.note-body').forEach(ta => {
        ta.addEventListener('change', function() { updateNoteBody(this.dataset.noteid, this.value); });
      });
      document.querySelectorAll('[data-copynote]').forEach(btn => {
        btn.addEventListener('click', () => {
          const data = loadData();
          const note = data.notes.find(n=>n.id===btn.dataset.copynote);
          if(note) navigator.clipboard.writeText(note.content).then(()=>alert('Copied!'));
        });
      });
      document.querySelectorAll('[data-deletenote]').forEach(btn => {
        btn.addEventListener('click', () => {
          if(confirm('Delete note?')) {
            const data = loadData();
            data.notes = data.notes.filter(n=>n.id!==btn.dataset.deletenote);
            saveData(data);
            renderNotes();
          }
        });
      });
    }

    function addNote() {
      const data = loadData();
      data.notes.push({ id: uid(), title: 'New Note', content: '' });
      saveData(data);
      renderNotes();
    }
    function updateNoteTitle(id, val) {
      const data = loadData();
      const note = data.notes.find(n=>n.id===id);
      if(note) { note.title = val; saveData(data); }
    }
    function updateNoteBody(id, val) {
      const data = loadData();
      const note = data.notes.find(n=>n.id===id);
      if(note) { note.content = val; saveData(data); }
    }

    // Modals
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    document.getElementById('createBoxBtn').addEventListener('click', () => {
      document.getElementById('boxDateTime').value = getNow();
      openModal('createBoxModal');
    });
    document.getElementById('cancelCreateBox').addEventListener('click', () => closeModal('createBoxModal'));
    document.getElementById('createBoxSubmit').addEventListener('click', () => {
      const name = document.getElementById('boxName').value.trim();
      const amt = parseFloat(document.getElementById('boxAmount').value);
      const cat = document.getElementById('boxCategory').value;
      const custom = document.getElementById('boxCustomCat').value.trim();
      const desc = document.getElementById('boxDesc').value.trim();
      const dt = document.getElementById('boxDateTime').value;
      if(!name || isNaN(amt) || amt<0) return alert('Please enter valid details');
      const finalCat = cat==='Custom'? (custom||'Custom') : cat;
      const data = loadData();
      data.boxes.push({ id: uid(), name, initialAmount: amt, initialCategory: finalCat, description: desc, initialDateTime: dt, transactions: [] });
      saveData(data);
      closeModal('createBoxModal');
      renderBudget();
    });

    function openAddModal(boxId) {
      document.getElementById('addBoxId').value = boxId;
      document.getElementById('addDateTime').value = getNow();
      openModal('addMoneyModal');
    }
    document.getElementById('cancelAddMoney').addEventListener('click', () => closeModal('addMoneyModal'));
    document.getElementById('addMoneySubmit').addEventListener('click', () => {
      const boxId = document.getElementById('addBoxId').value;
      const amt = parseFloat(document.getElementById('addAmount').value);
      const cat = document.getElementById('addCategory').value;
      const custom = document.getElementById('addCustomCat').value.trim();
      const desc = document.getElementById('addDesc').value.trim();
      const dt = document.getElementById('addDateTime').value;
      if(isNaN(amt)||amt<=0) return alert('Invalid amount');
      const finalCat = cat==='Custom'? (custom||'Custom') : cat;
      const data = loadData();
      const box = data.boxes.find(b=>b.id===boxId);
      if(!box) return;
      box.transactions.push({ id: uid(), type:'add', amount:amt, category:finalCat, description:desc, dateTime:dt });
      saveData(data);
      closeModal('addMoneyModal');
      renderBudget();
    });

    function openDeductModal(boxId) {
      document.getElementById('deductBoxId').value = boxId;
      document.getElementById('deductDateTime').value = getNow();
      openModal('deductMoneyModal');
    }
    document.getElementById('cancelDeductMoney').addEventListener('click', () => closeModal('deductMoneyModal'));
    document.getElementById('deductMoneySubmit').addEventListener('click', () => {
      const boxId = document.getElementById('deductBoxId').value;
      const amt = parseFloat(document.getElementById('deductAmount').value);
      const cat = document.getElementById('deductCategory').value;
      const custom = document.getElementById('deductCustomCat').value.trim();
      const desc = document.getElementById('deductDesc').value.trim();
      const dt = document.getElementById('deductDateTime').value;
      if(isNaN(amt)||amt<=0) return alert('Invalid amount');
      const data = loadData();
      const box = data.boxes.find(b=>b.id===boxId);
      if(!box) return;
      if(amt > getBoxBalance(box)) return alert('Insufficient balance');
      const finalCat = cat==='Custom'? (custom||'Custom') : cat;
      box.transactions.push({ id: uid(), type:'deduct', amount:amt, category:finalCat, description:desc, dateTime:dt });
      saveData(data);
      closeModal('deductMoneyModal');
      renderBudget();
    });

    // Custom category toggle
    document.getElementById('boxCategory').addEventListener('change', function(){
      document.getElementById('boxCustomCat').style.display = this.value==='Custom'?'block':'none';
    });
    document.getElementById('addCategory').addEventListener('change', function(){
      document.getElementById('addCustomCat').style.display = this.value==='Custom'?'block':'none';
    });
    document.getElementById('deductCategory').addEventListener('change', function(){
      document.getElementById('deductCustomCat').style.display = this.value==='Custom'?'block':'none';
    });

    document.getElementById('addNoteBtn').addEventListener('click', addNote);

    // Analytics
    function getWeekNumber(d) {
      const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
      const dayNum = date.getUTCDay() || 7;
      date.setUTCDate(date.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(date.getUTCFullYear(),0,1));
      return Math.ceil((((date - yearStart) / 86400000) + 1)/7);
    }

    function aggregateByPeriod(period) {
      const data = loadData();
      const map = new Map();
      data.boxes.forEach(box => {
        const initDate = new Date(box.initialDateTime);
        let key;
        if(period==='week') key = `${initDate.getFullYear()}-W${getWeekNumber(initDate)}`;
        else if(period==='month') key = `${initDate.getFullYear()}-${initDate.getMonth()+1}`;
        else key = 'all';
        const entry = map.get(key) || {income:0, expense:0};
        entry.income += parseFloat(box.initialAmount||0);
        map.set(key, entry);

        box.transactions.forEach(t=>{
          const d = new Date(t.dateTime);
          let k;
          if(period==='week') k = `${d.getFullYear()}-W${getWeekNumber(d)}`;
          else if(period==='month') k = `${d.getFullYear()}-${d.getMonth()+1}`;
          else k = 'all';
          const e = map.get(k) || {income:0, expense:0};
          if(t.type==='add') e.income += parseFloat(t.amount||0);
          else e.expense += parseFloat(t.amount||0);
          map.set(k, e);
        });
      });
      return map;
    }

    function renderAnalytics() {
      const data = loadData();
      let totalBal=0, totalInc=0, totalExp=0;
      data.boxes.forEach(b=>{ totalBal+=getBoxBalance(b); });
      data.boxes.forEach(b=>{
        totalInc += parseFloat(b.initialAmount||0);
        b.transactions.forEach(t=>{ if(t.type==='add') totalInc+=parseFloat(t.amount||0); else totalExp+=parseFloat(t.amount||0); });
      });
      document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-value" style="color:var(--blue);">${fmtCurrency(totalBal)}</div><div class="stat-label">Balance</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--green);">${fmtCurrency(totalInc)}</div><div class="stat-label">Income</div></div>
        <div class="stat-card"><div class="stat-value" style="color:var(--red);">${fmtCurrency(totalExp)}</div><div class="stat-label">Expenses</div></div>
      `;

      const activePeriod = document.querySelector('.period-btn.active')?.dataset.period || 'week';
      drawTrendChart(activePeriod);
      drawBarChart(activePeriod);
      drawCategoryChart(activePeriod);
    }

    document.getElementById('periodSelector').addEventListener('click', function(e){
      if(e.target.classList.contains('period-btn')){
        document.querySelectorAll('.period-btn').forEach(b=>b.classList.remove('active'));
        e.target.classList.add('active');
        renderAnalytics();
      }
    });

    function drawTrendChart(period) {
      const canvas = document.getElementById('trendChart');
      const ctx = canvas.getContext('2d');
      const container = canvas.parentElement;
      const rect = container.getBoundingClientRect();
      const w = rect.width - 20;
      const h = 190;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);

      const agg = aggregateByPeriod(period);
      if(agg.size===0) {
        ctx.fillStyle = '#94a3b8';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No data yet', w/2, h/2);
        return;
      }
      const keys = Array.from(agg.keys()).sort();
      const balances = keys.map((k,i) => {
        let inc = 0, exp = 0;
        for(let j=0; j<=i; j++) {
          inc += agg.get(keys[j]).income;
          exp += agg.get(keys[j]).expense;
        }
        return inc - exp;
      });
      const maxVal = Math.max(...balances.map(Math.abs), 1);
      const pad = {top:30, right:20, bottom:35, left:55};
      const chartW = w - pad.left - pad.right;
      const chartH = h - pad.top - pad.bottom;
      const scaleY = chartH / (maxVal * 1.2);

      ctx.beginPath();
      ctx.strokeStyle = '#e2e8f0';
      ctx.lineWidth = 1;
      for(let i=0; i<=4; i++) {
        const y = pad.top + (chartH/4)*i;
        ctx.moveTo(pad.left, y);
        ctx.lineTo(w - pad.right, y);
        ctx.stroke();
      }

      ctx.beginPath();
      ctx.strokeStyle = '#3b6cf4';
      ctx.lineWidth = 3;
      keys.forEach((k, i) => {
        const x = pad.left + (i/(keys.length-1||1)) * chartW;
        const y = pad.top + chartH - (balances[i] >= 0 ? balances[i] * scaleY : 0);
        if(i===0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      });
      ctx.stroke();

      ctx.fillStyle = '#3b6cf4';
      keys.forEach((k, i) => {
        const x = pad.left + (i/(keys.length-1||1)) * chartW;
        const y = pad.top + chartH - (balances[i] >= 0 ? balances[i] * scaleY : 0);
        ctx.beginPath(); ctx.arc(x, y, 5, 0, 2*Math.PI); ctx.fill();
        ctx.fillStyle = '#0b1424';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(k, x, pad.top + chartH + 16);
      });
    }

    function drawBarChart(period) {
      const canvas = document.getElementById('barChart');
      const ctx = canvas.getContext('2d');
      const container = canvas.parentElement;
      const rect = container.getBoundingClientRect();
      const w = rect.width - 20;
      const h = 210;
      const dpr = window.devicePixelRatio || 1;
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      canvas.style.width = w + 'px';
      canvas.style.height = h + 'px';
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, w, h);

      const agg = aggregateByPeriod(period);
      if(agg.size===0) return;
      const keys = Array.from(agg.keys()).sort().slice(-6);
      const pad = {top:20, right:20, bottom:45, left:55};
      const chartW = w - pad.left - pad.right;
      const chartH = h - pad.top - pad.bottom;
      const maxVal = Math.max(...keys.flatMap(k => [agg.get(k).income, agg.get(k).expense]), 1);
      const scale = chartH / (maxVal * 1.2);
      const barWidth = Math.min(22, chartW / keys.length / 2.5);

      keys.forEach((k, i) => {
        const x0 = pad.left + i * (chartW / keys.length) + (chartW / keys.length) / 4;
        const incH = agg.get(k).income * scale;
        const expH = agg.get(k).expense * scale;
        ctx.fillStyle = '#0dca7a';
        ctx.fillRect(x0 - barWidth/2, pad.top + chartH - incH, barWidth, incH);
        ctx.fillStyle = '#f43e5f';
        ctx.fillRect(x0 + barWidth/2, pad.top + chartH - expH, barWidth, expH);
        ctx.fillStyle = '#0b1424';
        ctx.font = '10px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText(k, x0, pad.top + chartH + 18);
      });
    }

    function drawCategoryChart(period) {
      const canvas = document.getElementById('categoryChart');
      const ctx = canvas.getContext('2d');
      const container = canvas.parentElement;
      const size = Math.min(220, container.clientWidth - 40);
      const dpr = window.devicePixelRatio || 1;
      canvas.width = size * dpr;
      canvas.height = size * dpr;
      canvas.style.width = size + 'px';
      canvas.style.height = size + 'px';
      ctx.scale(dpr, dpr);
      ctx.clearRect(0, 0, size, size);

      const data = loadData();
      const catMap = new Map();
      data.boxes.forEach(box => {
        box.transactions.forEach(t => {
          if(t.type === 'deduct') {
            const d = new Date(t.dateTime);
            let include = false;
            if(period === 'all') include = true;
            else if(period === 'week') {
              const now = new Date(); 
              const weekAgo = new Date(now.getFullYear(), now.getMonth(), now.getDate() - 7);
              include = d >= weekAgo;
            } else if(period === 'month') {
              const now = new Date(); 
              const monthAgo = new Date(now.getFullYear(), now.getMonth() - 1, now.getDate());
              include = d >= monthAgo;
            }
            if(include) {
              const cat = t.category || 'Other';
              catMap.set(cat, (catMap.get(cat) || 0) + parseFloat(t.amount || 0));
            }
          }
        });
      });
      const entries = Array.from(catMap.entries()).sort((a,b) => b[1] - a[1]);
      const total = entries.reduce((s, e) => s + e[1], 0);
      if(total === 0) {
        ctx.fillStyle = '#94a3b8';
        ctx.font = '14px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('No expenses yet', size/2, size/2);
        return;
      }
      const cx = size/2, cy = size/2, outer = size*0.38, inner = size*0.24;
      const colors = ['#f43e5f','#f97316','#eab308','#0dca7a','#3b82f6','#8b5cf6','#ec4899'];
      let start = -Math.PI/2;
      entries.forEach((e, i) => {
        const slice = (e[1]/total) * Math.PI * 2;
        ctx.beginPath();
        ctx.arc(cx, cy, outer, start, start + slice);
        ctx.arc(cx, cy, inner, start + slice, start, true);
        ctx.closePath();
        ctx.fillStyle = colors[i % colors.length];
        ctx.fill();
        start += slice;
      });
      ctx.fillStyle = '#0b1424';
      ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Expenses', cx, cy - 8);
      ctx.fillText(fmtCurrency(total), cx, cy + 16);
    }

    function esc(str) { const d = document.createElement('div'); d.textContent = str; return d.innerHTML; }

    // Init
    renderBudget();
    renderNotes();
  })();
</script>
</body>
</html>
